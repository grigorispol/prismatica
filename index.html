<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>prismatica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
<style>

  /* ============================
     TOKENS — brand palette
     ============================ */
  :root{
    --white:  #FFFDE7;
    --black:  #1A1A1A;
    --red:    #CC2929;
    --orange: #E8630A;
    --yellow: #F0C522;
    --green:  #7DC442;
    --blue:   #2D6CDF;
    --purple: #6B3FA0;

    --font-display: 'Playpen Sans', cursive;
    --header-h: 64px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--white);
    color: var(--black);
    font-family: var(--font-display);
  }

  /* ============================
     BACKGROUND — faint watermark
     of the six subject areas:
     physics / math / quantum /
     biology / chemistry / coding
     ============================ */
  .bg-watermark{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    pointer-events: none;
  }

  /* ============================
     HEADER
     ============================ */
  .site-header{
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    min-height: var(--header-h);
    padding: 8px clamp(20px, 5vw, 64px);
    background: rgba(255, 253, 231, 0.62);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset;
  }

  /* thin divider under the header — solid black, no motion;
     the light/colour play lives in the other elements instead */
  .site-header::after{
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2px;
    background: var(--black);
  }

  /* ---------- brand wordmark + prism logo ---------- */
  .brand{
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-display);
    font-weight: 750;
    font-size: clamp(26px, 3.36vw, 36px);
    letter-spacing: 0.2px;
    color: var(--black);
    cursor: default;
    user-select: none;
    flex-shrink: 0;
  }

  .brand-text{
    display: inline-flex;
    align-items: baseline;
  }

  .brand .letter{
    display: inline-block;
    opacity: 0;
    color: var(--c, var(--black));
    animation: prismReveal 1s ease forwards;
    animation-delay: var(--d, 0ms);
    transition: color .35s ease;
  }

  @keyframes prismReveal{
    0%   { opacity: 0; color: var(--c, var(--black)); }
    35%  { opacity: 1; color: var(--c, var(--black)); }
    100% { opacity: 1; color: var(--black); }
  }

  /* hover: the wordmark catches the light again, in colour, no glow */
  .brand:hover .letter{
    color: var(--c, var(--black));
  }

  /* the prism: where the light comes from — its dark facet keeps
     the colour permanently, like glass still splitting the light */
  .logo-mark{
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .logo-mark svg{
    width: clamp(40px, 5.1vw, 55px);
    height: clamp(40px, 5.1vw, 55px);
    display: block;
    overflow: visible;
  }
  .prism-color{
    opacity: 0;
    animation: prismGlow 0.6s ease forwards;
    animation-delay: 1150ms;
  }
  @keyframes prismGlow{
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }

  /* ---------- nav ---------- */
  .nav{
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .btn{
    font-family: var(--font-display);
    font-weight: 550;
    font-size: 16px;
    line-height: 1;
    text-decoration: none;
    border-radius: 999px;
    padding: 7px 11px;
    border: 2px solid var(--black);
    cursor: pointer;
    transition: background-color .3s ease, color .25s ease;
    white-space: nowrap;
  }

  .btn-outline{
    background: var(--white);
    color: var(--black);
  }
  .btn-outline:hover{
    background: var(--orange);
  }

  .btn-solid{
    background: var(--black);
    color: var(--white);
  }
  .btn-solid:hover{
    background: var(--orange);
  }

  .btn-github{
    width: 38px;
    height: 38px;
    padding: 0;
    border: 2px solid var(--black);
    border-radius: 50%;
    background: var(--white);
    color: var(--black);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background-color .3s ease, color .3s ease;
  }
  .btn-github:hover{
    background: var(--orange);
    color: var(--white);
  }
  .btn-github svg{ width: 18px; height: 18px; }

  .btn:focus-visible,
  .btn-github:focus-visible{
    outline: 3px solid var(--blue);
    outline-offset: 3px;
  }

  /* ---------- placeholder space below header, just so the
     watermark background is visible for this first step ---------- */
  main.placeholder{
    min-height: calc(100vh - var(--header-h));
  }

  @media (max-width: 720px){
    .nav{ gap: 8px; }
    .btn{ padding: 6px 10px; font-size: 14.5px; }
  }

  @media (prefers-reduced-motion: reduce){
    .brand .letter{
      animation: none !important;
      opacity: 1;
      color: var(--black);
      text-shadow: none;
      transition: none;
    }
    .prism-color{
      animation: none !important;
      opacity: 1;
    }
  }
</style>
</head>
<body>

  <!-- faint watermark background: physics / math / quantum / biology / chemistry / coding -->
  <svg class="bg-watermark" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>

        <!-- physics: atom -->
        <g transform="translate(40,55) rotate(-12) scale(1.25)" fill="none" stroke="rgba(26,26,26,0.07)" stroke-width="1.4" stroke-linecap="round">

          <ellipse cx="0" cy="0" rx="11" ry="4.4"/>
          <ellipse cx="0" cy="0" rx="11" ry="4.4" transform="rotate(60)"/>
          <ellipse cx="0" cy="0" rx="11" ry="4.4" transform="rotate(120)"/>
        </g>

        <!-- math: pi -->
        <g transform="translate(196,42) rotate(6) scale(1.25)" fill="none" stroke="rgba(26,26,26,0.07)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M -8 -7 H 9 M -4.5 -7 V 8 M 4.5 -7 C 4.5 -1 4.5 4 7.5 8"/>
        </g>

        <!-- quantum: wave -->
        <g transform="translate(252,150) rotate(-4) scale(1.15)" fill="none" stroke="rgba(26,26,26,0.07)" stroke-width="1.4" stroke-linecap="round">
          <path d="M -16 0 Q -10 -9 -4 0 T 8 0 T 20 0"/>
          <circle cx="21" cy="0" r="1.5" fill="rgba(26,26,26,0.07)" stroke="none"/>
        </g>

        <!-- biology: dna -->
        <g transform="translate(76,178) rotate(12) scale(1.1)" fill="none" stroke="rgba(26,26,26,0.07)" stroke-width="1.4" stroke-linecap="round">
          <path d="M -5 -13 C 0 -8 0 -3 -5 2 C 0 7 0 7 -5 17"/>
          <path d="M 5 -13 C 0 -8 0 -3 5 2 C 0 7 0 7 5 17"/>
          <path d="M -3.5 -9 H 3.5 M -4 -3 H 4 M -4 2 H 4 M -3.5 9 H 3.5"/>
        </g>

        <!-- chemistry: flask -->
        <g transform="translate(190,238) rotate(-6) scale(1.2)" fill="none" stroke="rgba(26,26,26,0.07)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M -2 -10 H 2 M -1 -10 V -3 L -6 9 C -6.6 10.5 -5.5 12 -4 12 H 4 C 5.5 12 6.6 10.5 6 9 L 1 -3 V -10"/>
          <circle cx="-1" cy="6" r="0.9" fill="rgba(26,26,26,0.07)" stroke="none"/>
          <circle cx="2" cy="2" r="0.7" fill="rgba(26,26,26,0.07)" stroke="none"/>
        </g>

        <!-- coding: brackets -->
        <g transform="translate(28,268) rotate(4) scale(1.25)" fill="none" stroke="rgba(26,26,26,0.07)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M -3 -6 L -9 0 L -3 6"/>
          <path d="M 3 -6 L 9 0 L 3 6"/>
          <path d="M 1 -8 L -1 8"/>
        </g>

      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#sciDoodles)"/>
  </svg>

  <header class="site-header">
    <span class="brand" aria-label="prismatica">
      <span class="brand-text" id="brandText"></span>
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 512 512">
          <defs>
            <linearGradient id="prismSpectrum" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   style="stop-color: var(--red)"/>
              <stop offset="20%"  style="stop-color: var(--orange)"/>
              <stop offset="40%"  style="stop-color: var(--yellow)"/>
              <stop offset="60%"  style="stop-color: var(--green)"/>
              <stop offset="80%"  style="stop-color: var(--blue)"/>
              <stop offset="100%" style="stop-color: var(--purple)"/>
            </linearGradient>
            <clipPath id="prismClip">
              <path d="M487.83,319.44,295.63,36.88a48,48,0,0,0-79.26,0L24.17,319.44A47.1,47.1,0,0,0,41.1,387.57L233.3,490.32a48.05,48.05,0,0,0,45.4,0L470.9,387.57a47.1,47.1,0,0,0,16.93-68.13Zm-431.26,41a16.12,16.12,0,0,1-8-10.38,16.8,16.8,0,0,1,2.37-13.62L232.66,69.26c2.18-3.21,7.34-1.72,7.34,2.13v374c0,5.9-6.54,9.63-11.87,6.78Z"/>
            </clipPath>
          </defs>
          <path class="prism-dark"  d="M487.83,319.44,295.63,36.88a48,48,0,0,0-79.26,0L24.17,319.44A47.1,47.1,0,0,0,41.1,387.57L233.3,490.32a48.05,48.05,0,0,0,45.4,0L470.9,387.57a47.1,47.1,0,0,0,16.93-68.13Zm-431.26,41a16.12,16.12,0,0,1-8-10.38,16.8,16.8,0,0,1,2.37-13.62L232.66,69.26c2.18-3.21,7.34-1.72,7.34,2.13v374c0,5.9-6.54,9.63-11.87,6.78Z" fill="var(--black)"/>
          <path class="prism-color" d="M487.83,319.44,295.63,36.88a48,48,0,0,0-79.26,0L24.17,319.44A47.1,47.1,0,0,0,41.1,387.57L233.3,490.32a48.05,48.05,0,0,0,45.4,0L470.9,387.57a47.1,47.1,0,0,0,16.93-68.13Zm-431.26,41a16.12,16.12,0,0,1-8-10.38,16.8,16.8,0,0,1,2.37-13.62L232.66,69.26c2.18-3.21,7.34-1.72,7.34,2.13v374c0,5.9-6.54,9.63-11.87,6.78Z" fill="url(#prismSpectrum)"/>
          <path class="prism-outline" d="M487.83,319.44,295.63,36.88a48,48,0,0,0-79.26,0L24.17,319.44A47.1,47.1,0,0,0,41.1,387.57L233.3,490.32a48.05,48.05,0,0,0,45.4,0L470.9,387.57a47.1,47.1,0,0,0,16.93-68.13Zm-431.26,41a16.12,16.12,0,0,1-8-10.38,16.8,16.8,0,0,1,2.37-13.62L232.66,69.26c2.18-3.21,7.34-1.72,7.34,2.13v374c0,5.9-6.54,9.63-11.87,6.78Z" fill="none" stroke="var(--black)" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </span>
    </span>

    <nav class="nav" aria-label="main navigation">
      <a class="btn btn-outline" href="#information">information</a>
      <a class="btn btn-outline" href="#features">features</a>
      <a class="btn btn-solid" href="#get-started">get started</a>
      <a class="btn-github" href="https://github.com/" target="_blank" rel="noopener" aria-label="GitHub">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
      </a>
    </nav>
  </header>

  <main class="hero">
    <div class="reel-wrap" aria-label="five subject areas">
      <svg class="reel" viewBox="0 0 907 907" role="img">
        <!-- rotating group: the hand-drawn reel photo + 5 invisible
             hover zones, each orbiting the rim but staying upright
             (counter-rotated against the wheel spin) -->
        <g class="reel-spin">

          <image class="reel-photo" href="wheel_transparent.png"
                 x="0" y="0" width="907" height="907" />




</g>
      </svg>
    </div>
  </main>

  <style>
    /* ============================
       HERO + REEL
       ============================ */
    .hero{
      position: relative;
      min-height: calc(100vh - var(--header-h));
      overflow: hidden;
    }

    .reel-wrap{
      position: absolute;
      top: 50%;
      right: -18vw;
      transform: translateY(-50%);
      width: min(85vw, 880px);
      aspect-ratio: 1;
    }

    .reel{
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .reel-photo{
      /* the uploaded reel artwork — used as-is, pixel for pixel */
    }

    /* the rotating assembly: the photo + slots spin together, slowly,
       forever — hovering brightens a slot but never pauses motion */
    .reel-spin{
      transform-origin: 457.17px 444.68px;
      animation: reelSpin 32s linear infinite;
    }

    @keyframes reelSpin{
      from{ transform: rotate(0deg); }
      to{ transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce){
      .reel-spin{ animation: none !important; }
      }

    @media (max-width: 900px){
      .reel-wrap{
        right: -28vw;
        width: min(110vw, 700px);
      }
    }
  </style>

  <script>
    // Build the "prismatica" wordmark letter by letter. The colour
    // sweep now travels left to right — as if light is entering
    // the word from the start and racing toward the prism logo,
    // fading to black behind it as it passes. Once the sweep
    // reaches the logo, the logo itself lights up and keeps a
    // slow, permanent shimmer of colour moving inside it.
    var brandEl = document.getElementById('brandText');
    var word = "prismatica";
    var n = word.length;
    var spectrum = ['var(--red)','var(--orange)','var(--yellow)','var(--green)','var(--blue)','var(--purple)'];

    word.split('').forEach(function(ch, i){
      var span = document.createElement('span');
      span.className = 'letter';
      span.textContent = ch;
      span.style.setProperty('--c', spectrum[i % spectrum.length]);
      span.style.setProperty('--d', (i * 110) + 'ms');
      brandEl.appendChild(span);
    });
  </script>

</body>
</html>
